<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="256" height="256" rx="56" fill="url(#bg)"/>
  <!-- Microphone capsule -->
  <rect x="101" y="48" width="54" height="84" rx="27" fill="white"/>
  <!-- Mic arc -->
  <path d="M76 128 a52 52 0 0 0 104 0" stroke="white" stroke-width="14" stroke-linecap="round" fill="none"/>
  <!-- Stand -->
  <line x1="128" y1="180" x2="128" y2="208" stroke="white" stroke-width="14" stroke-linecap="round"/>
  <!-- Base -->
  <line x1="104" y1="208" x2="152" y2="208" stroke="white" stroke-width="14" stroke-linecap="round"/>
  <!-- Sound wave small -->
  <path d="M182 80 a24 48 0 0 1 0 72" stroke="white" stroke-width="10" stroke-linecap="round" fill="none" opacity="0.6"/>
  <!-- Sound wave large -->
  <path d="M202 60 a36 68 0 0 1 0 112" stroke="white" stroke-width="10" stroke-linecap="round" fill="none" opacity="0.3"/>
</svg>
